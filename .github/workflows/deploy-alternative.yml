name: Deploy to CloudBase (Alternative)

on:
  workflow_dispatch:

env:
  ENV_ID: weight-tracker-1ghr085dd7d6cff2
  SERVICE_NAME: weight-tracker-api

jobs:
  deploy-with-tcr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent Container Registry
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/weight-tracker-api:${{ github.sha }}
            ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/weight-tracker-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Configure CloudBase credentials
        run: |
          mkdir -p ~/.config/cloudbase
          cat > ~/.config/cloudbase/credentials.json << EOF
          {
            "version": "2.0",
            "appId": "",
            "prompt": "false",
            "credentials": {
              "${{ env.ENV_ID }}": {
                "secretId": "${{ secrets.TENCENT_CLOUD_SECRET_ID }}",
                "secretKey": "${{ secrets.TENCENT_CLOUD_SECRET_KEY }}",
                "token": ""
              }
            }
          }
          EOF

      - name: Deploy to CloudRun with image
        run: |
          # 尝试不同的命令格式
          echo "Trying to deploy with image..."
          
          # 方法1: 使用容器镜像部署
          cloudbase cloudrun:deploy \
            --envId "${{ env.ENV_ID }}" \
            --serviceName "${{ env.SERVICE_NAME }}" \
            --containerImage "ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/weight-tracker-api:${{ github.sha }}" \
            --containerPort 3000 \
            --minNum 0 \
            --maxNum 10 \
            --cpu 0.25 \
            --mem 0.5 \
            --envParams '{"DB_TYPE":"cloudbase","CLOUDBASE_ENV_ID":"${{ env.ENV_ID }}","NODE_ENV":"production","PORT":"3000"}' \
            --noConfirm || echo "Deploy command may have different syntax"

      - name: Deployment status
        if: always()
        run: |
          echo "========================================"
          echo "  Deployment Attempt Complete"
          echo "========================================"
          echo "Please check CloudBase console:"
          echo "https://console.cloud.tencent.com/tcb/env/${{ env.ENV_ID }}/cloudrun"
