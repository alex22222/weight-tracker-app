name: Deploy to CloudBase

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clean and install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps --no-optional

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          DB_TYPE: cloudbase
          CLOUDBASE_ENV_ID: weight-tracker-1ghr085dd7d6cff2
        run: |
          unset __NEXT_PRIVATE_STANDALONE_CONFIG || true
          npm run build

      - name: Setup CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Configure CloudBase credentials
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        run: |
          mkdir -p ~/.config/cloudbase
          cat > ~/.config/cloudbase/credentials.json << EOF
          {
            "version": "2.0",
            "appId": "",
            "prompt": "false",
            "credentials": {
              "weight-tracker-1ghr085dd7d6cff2": {
                "secretId": "${TENCENT_CLOUD_SECRET_ID}",
                "secretKey": "${TENCENT_CLOUD_SECRET_KEY}",
                "token": ""
              }
            }
          }
          EOF

      - name: Deploy using cloudbase.json
        run: |
          # 使用 cloudbase.json 配置部署
          cloudbase deploy --verbose

      - name: Get service URL
        id: get-url
        run: |
          # 获取服务访问地址
          SERVICE_URL=$(cloudbase cloudrun:list 2>/dev/null | grep "weight-tracker-api" | awk '{print $NF}' || echo "")
          if [ -z "$SERVICE_URL" ]; then
            # 尝试从 CloudBase 控制台获取默认域名格式
            SERVICE_URL="weight-tracker-api-weight-tracker-1ghr085dd7d6cff2.gz.apigw.tencentcs.com"
          fi
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Service URL: https://$SERVICE_URL"

      - name: Health check
        run: |
          URL="${{ steps.get-url.outputs.url }}"
          echo "Checking health at: https://$URL/api/health"
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Waiting for service... (status: $STATUS)"
            sleep 10
          done
          echo "⚠️ Health check did not pass, but deployment may still be successful"
          echo "Please check CloudBase console manually"

      - name: Deployment status
        if: always()
        run: |
          echo "========================================"
          echo "  Deployment Status: ${{ job.status }}"
          echo "========================================"
          echo "Environment: weight-tracker-1ghr085dd7d6cff2"
          echo "Service: weight-tracker-api"
          echo ""
          echo "CloudBase Console:"
          echo "https://console.cloud.tencent.com/tcb/env/weight-tracker-1ghr085dd7d6cff2/cloudrun"
          echo ""
          echo "Expected Service URL:"
          echo "https://weight-tracker-api-weight-tracker-1ghr085dd7d6cff2.gz.apigw.tencentcs.com"
