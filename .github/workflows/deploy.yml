name: Deploy to Tencent CloudBase

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [closed]

env:
  NODE_VERSION: '18'
  TENCENT_CLOUD_REGION: ap-guangzhou
  SERVICE_NAME: weight-tracker-api
  IMAGE_NAME: weight-tracker-api

jobs:
  # 构建阶段
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Tencent Container Registry
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # 部署阶段
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Configure Tencent Cloud credentials
        run: |
          mkdir -p ~/.config/cloudbase
          cat > ~/.config/cloudbase/credentials.json << 'EOF'
          {
            "version": "2.0",
            "appId": "",
            "prompt": "false",
            "credentials": {
              "${{ secrets.CLOUDBASE_ENV_ID }}": {
                "secretId": "${{ secrets.TENCENT_CLOUD_SECRET_ID }}",
                "secretKey": "${{ secrets.TENCENT_CLOUD_SECRET_KEY }}",
                "token": ""
              }
            }
          }
          EOF

      - name: Deploy to CloudBase CloudRun
        env:
          TENCENTCLOUD_SECRETID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENTCLOUD_SECRETKEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        run: |
          # 获取镜像标签
          IMAGE_TAG="ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
          
          echo "Deploying image: $IMAGE_TAG"
          
          # 部署或更新服务
          cloudbase cloudrun:deploy \
            --service ${{ env.SERVICE_NAME }} \
            --env-id ${{ secrets.CLOUDBASE_ENV_ID }} \
            --image "$IMAGE_TAG" \
            --port 3000 \
            --min-num 0 \
            --max-num 10 \
            --cpu 0.25 \
            --mem 0.5 \
            --env-vars DB_TYPE=cloudbase,CLOUDBASE_ENV_ID=${{ secrets.CLOUDBASE_ENV_ID }},NODE_ENV=production,PORT=3000 \
            --no-confirm \
            --verbose

      - name: Verify deployment
        run: |
          echo "Waiting for service to be ready..."
          sleep 30
          
          # 获取服务访问地址
          SERVICE_URL=$(cloudbase cloudrun:services:get \
            --service ${{ env.SERVICE_NAME }} \
            --env-id ${{ secrets.CLOUDBASE_ENV_ID }} \
            --json | jq -r '.[0].accessUrl')
          
          echo "Service URL: $SERVICE_URL"
          
          # 健康检查
          for i in {1..10}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/api/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Deployment successful! Health check passed."
              exit 0
            fi
            echo "Attempt $i: Service not ready yet (status: $HTTP_STATUS), waiting..."
            sleep 10
          done
          
          echo "❌ Deployment verification failed after 10 attempts"
          exit 1

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
