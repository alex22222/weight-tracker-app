name: PR Check

on:
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '18'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Next.js
        run: npm run build
        env:
          DB_TYPE: cloudbase
          CLOUDBASE_ENV_ID: dummy-env-id-for-build
